# Streamlit Secrets Configuration
# Copy this file to .streamlit/secrets.toml and fill in your values
# DO NOT commit secrets.toml to git - it's already in .gitignore

# OpenAI API Key for the AI Bot
# Get your key from: https://platform.openai.com/api-keys
AI_BOT_MAQ_OPENAI_API_KEY = "your-actual-api-key-here"

# Optional: Power BI Configuration
# POWER_BI_USERNAME = "your-power-bi-username"
# POWER_BI_PASSWORD = "your-power-bi-password"

# Optional: Logging Level (DEBUG, INFO, WARNING, ERROR)
# LOG_LEVEL = "INFO"

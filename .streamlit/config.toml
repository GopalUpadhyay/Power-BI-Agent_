[theme]
base = "dark"
primaryColor = "#FF6B35"
backgroundColor = "#1a1a1a"
secondaryBackgroundColor = "#262626"
textColor = "#FFFFFF"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "viewer"
theme = "dark"
showSidebarNavigation = false
showRunMargin = true

[logger]
level = "info"

[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 200
maxMessageSize = 200
runOnSave = false

[ui]
hideTopBar = false
hideFooter = false
hideSidebarNav = false

[deprecation]
showPyplotGlobalUse = false

[browser]
gatherUsageStats = false
serverAddress = "localhost"

[global]
dataFrameSerialization = "arrow"
minCacheEntrySize = 0
maxMessageSize = 200
suppressDeprecationWarnings = true

[runner]
magicEnabled = true
fastReruns = true

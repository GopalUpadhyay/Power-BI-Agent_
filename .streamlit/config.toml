[theme]
base = "dark"
primaryColor = "#FF6B35"
backgroundColor = "#1a1a1a"
secondaryBackgroundColor = "#262626"
textColor = "#FFFFFF"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "viewer"
theme = "dark"

[logger]
level = "info"

[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 200

[ui]
hideTopBar = false
hideFooter = false
